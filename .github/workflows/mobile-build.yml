name: Mobile App Build

# Builds the Android APK on every push touching mobile/, and on mobile-v* tags publishes it
# as a GitHub Release (mirroring agent-release.yml's pattern for the Go agent). This exists
# because there's no local Flutter/Android SDK toolchain available in the dev environment -
# CI is the only place this actually gets compiled and verified.
on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-build.yml"
    tags:
      - "mobile-v*"
  pull_request:
    paths:
      - "mobile/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: logmonitor-mobile-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/build/app/outputs/flutter-apk/app-release.apk
