name: Agent Release

# Triggered by pushing a tag like agent-v0.1.0. Cross-compiles the endpoint agent for
# Windows and Linux and publishes the binaries to a GitHub Release. The Windows binary is
# unsigned for now — this is the slot where a real Authenticode signing step gets added
# once a code-signing certificate is available (see agent/README.md).
on:
  push:
    tags:
      - "agent-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            out: agent.exe
          - goos: linux
            goarch: amd64
            out: logmonitor-agent-linux-amd64
          - goos: linux
            goarch: arm64
            out: logmonitor-agent-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: agent/go.sum

      - name: Build
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w -X main.AgentVersion=${{ github.ref_name }}" -o "${{ matrix.out }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: agent/${{ matrix.out }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
