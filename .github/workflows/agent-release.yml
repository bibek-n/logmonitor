name: Agent Release

# Triggered by pushing a tag like agent-v0.1.0. Cross-compiles the endpoint agent for
# Windows and Linux and publishes the binaries to a GitHub Release. The Windows binary is
# unsigned for now — this is the slot where a real Authenticode signing step gets added
# once a code-signing certificate is available (see agent/README.md).
on:
  push:
    tags:
      - "agent-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            out: agent.exe
            pkg: .
          - goos: linux
            goarch: amd64
            out: logmonitor-agent-linux-amd64
            pkg: .
          - goos: linux
            goarch: arm64
            out: logmonitor-agent-linux-arm64
            pkg: .
          # Chat companion — a separate small binary from the main agent (see the package
          # comment in agent/chattray/main.go for why), built from its own subdirectory.
          - goos: windows
            goarch: amd64
            out: chattray.exe
            pkg: ./chattray
          - goos: linux
            goarch: amd64
            out: logmonitor-chattray-linux-amd64
            pkg: ./chattray
          - goos: linux
            goarch: arm64
            out: logmonitor-chattray-linux-arm64
            pkg: ./chattray
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: agent/go.sum

      - name: Build
        working-directory: agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w -X main.AgentVersion=${{ github.ref_name }}" -o "${{ matrix.out }}" "${{ matrix.pkg }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: agent/${{ matrix.out }}

  # Separate job, not part of the main matrix — this needs a different Go toolchain (1.20,
  # the last version that still supports Windows 7/8; Go 1.21+ requires Windows 10+) and a
  # different go.mod/go.sum (every dependency pinned to a version still buildable under
  # 1.20 - see agent/go.mod.win7's header comment). Both architectures matter here: a real
  # Windows 7 box turned out to be 32-bit, and Windows gives no useful error for an
  # architecture mismatch (just "this version of %1 is not compatible", no crash log, no
  # visible failure at all if launched from a GUI) — found the hard way onboarding one.
  # Only builds the main agent, not the chat companion or Linux variants - Windows 7 is the
  # one legacy-OS case this exists for.
  build-win7:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            out: agent-win7.exe
          - goarch: 386
            out: agent-win7-x86.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.20"

      - name: Swap in Windows 7-compatible dependency set
        working-directory: agent
        run: |
          cp go.mod.win7 go.mod
          cp go.sum.win7 go.sum

      - name: Build
        working-directory: agent
        env:
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w -X main.AgentVersion=${{ github.ref_name }}" -o "${{ matrix.out }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: agent/${{ matrix.out }}

  release:
    needs: [build, build-win7]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
